<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>42 inches to mars!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=thirdnature-17">
</head>
<body>

  <div id="menubar" role="banner">
    <div class="mb-left">
      <button id="start-btn" aria-label="Open Now window" title="Open Now window">
        <span class="mb-apple" aria-hidden="true">&#8984;</span>
      </button>
      <span class="mb-name" id="mb-name" role="button" tabindex="0" title="Admin login">42 inches to mars!</span>
    </div>
    <div class="mb-right">
      <button id="reset-icons-btn" title="Reset icon layout" aria-label="Reset icon layout"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect x="1" y="1" width="4" height="4" stroke="currentColor" stroke-width="1.2"/><rect x="7" y="1" width="4" height="4" stroke="currentColor" stroke-width="1.2"/><rect x="1" y="7" width="4" height="4" stroke="currentColor" stroke-width="1.2"/><rect x="7" y="7" width="4" height="4" stroke="currentColor" stroke-width="1.2"/></svg></button>
      <button id="theme-btn" title="Toggle light / dark mode" aria-label="Toggle theme">◐</button>
      <span id="clock" aria-live="polite"></span>
    </div>
  </div>

  <main id="desktop" role="main" aria-label="Desktop">
    <!-- Icons and windows are created by app.js -->
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
  <script src="data.js?v=thirdnature-17"></script>
  <script src="app.js?v=thirdnature-17"></script>
</body>
</html>
