<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirror Cube · Orlan Y. Syshui</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f2f2f0; --fg: #111; --dim: #888; --accent: #333;
      --panel-bg: #f8f8f6; --panel-border: #ddd;
      --font: 'Space Mono', monospace;
    }
    html, body { width: 100%; height: 100%; background: var(--bg); color: var(--fg);
      font-family: var(--font); overflow: hidden; }

    /* ── canvas + SVG overlay — always full screen ── */
    #c { position: fixed; inset: 0; }
    #tags { position: fixed; inset: 0; pointer-events: none; z-index: 10; overflow: visible; }

    /* ── content panel — overlay, cube untouched ── */
    #panel {
      position: fixed; top: 0; right: 0; width: 44%; height: 100%;
      background: var(--panel-bg); border-left: 1px solid var(--panel-border);
      transform: translateX(100%);
      transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto; z-index: 20; padding: 52px 40px 40px;
    }
    body.panel-open #panel { transform: translateX(0); }
    body.panel-open #panel.expanded { width: 66.666%; }

    #panel-close {
      position: absolute; top: 14px; left: 16px;
      background: none; border: 1px solid var(--panel-border); color: var(--dim);
      font-family: var(--font); font-size: 10px; padding: 4px 8px;
      cursor: pointer; letter-spacing: 0.08em;
    }
    #panel-close:hover { color: var(--fg); border-color: var(--accent); }
    #panel-expand {
      position: absolute; top: 14px; left: 88px;
      background: none; border: 1px solid var(--panel-border); color: var(--dim);
      font-family: var(--font); font-size: 10px; padding: 4px 8px;
      cursor: pointer; letter-spacing: 0.08em;
    }
    #panel-expand:hover { color: var(--fg); border-color: var(--accent); }

    #panel-shell {
      display: grid; grid-template-columns: 150px minmax(0, 1fr);
      gap: 26px; align-items: start;
    }
    #panel-nav {
      position: sticky; top: 0;
      display: flex; flex-direction: column; gap: 12px;
      max-height: calc(100vh - 110px); overflow-y: auto;
      padding-right: 8px; border-right: 1px solid var(--panel-border);
    }
    .panel-nav-section { display: flex; flex-direction: column; gap: 3px; }
    .panel-nav-heading {
      font-size: 8px; color: var(--dim); letter-spacing: 0.18em;
      margin-bottom: 3px; text-transform: uppercase;
    }
    .panel-nav-item {
      background: none; border: 0; color: #777; cursor: pointer;
      font-family: var(--font); font-size: 9px; line-height: 1.35;
      padding: 3px 0; text-align: left;
    }
    .panel-nav-item:hover,
    .panel-nav-item.active { color: var(--fg); }
    .panel-nav-item.active::before { content: '→ '; }
    .panel-axis-menu {
      border: 1px solid var(--panel-border); padding: 6px 8px;
      background: rgba(255,255,255,0.22);
    }
    .panel-axis-menu summary {
      cursor: pointer; color: var(--fg); font-size: 9px;
      letter-spacing: 0.12em; list-style: none;
    }
    .panel-axis-menu summary::-webkit-details-marker { display: none; }
    .panel-axis-menu summary::after { content: ' ▾'; color: var(--dim); }
    .panel-axis-menu[open] summary::after { content: ' ▴'; }
    .panel-axis-options { display: flex; flex-direction: column; gap: 3px; margin-top: 8px; }
    .panel-nav-note { color: #888; font-size: 9px; line-height: 1.45; }
    .object-index {
      display: grid; grid-template-columns: 48px minmax(0, 1fr);
      gap: 8px; align-items: baseline; width: 100%;
    }
    .object-index-no { color: inherit; }
    .undiscovered-item {
      color: #aaa; font-size: 10px; letter-spacing: 0.18em;
      padding: 3px 0;
    }
    .field-no {
      color: #555; font-size: 9px; letter-spacing: 0.12em;
      margin-left: 6px;
    }

    #panel-id   { font-size: 9px; color: var(--dim); letter-spacing: 0.2em; margin-bottom: 6px; }
    #panel-title { font-size: 20px; font-weight: 700; letter-spacing: -0.01em;
      margin-bottom: 20px; line-height: 1.2; }
    #panel-body { font-size: 12px; line-height: 1.85; color: #999; }
    #panel-body p { margin-bottom: 1em; }
    #panel-body a { color: var(--accent); }
    #panel-links { margin-top: 20px; display: flex; flex-direction: column; gap: 6px; }
    .panel-link {
      font-size: 10px; color: var(--dim); letter-spacing: 0.1em;
      background: none; border: 1px solid var(--panel-border); padding: 6px 10px;
      cursor: pointer; font-family: var(--font); text-align: left; text-decoration: none;
      display: block;
    }
    .panel-link:hover { color: var(--fg); border-color: var(--accent); }
    .registry-card { color: #222; }
    .registry-head {
      display: grid; grid-template-columns: 96px minmax(0, 1fr) auto;
      gap: 10px; align-items: start; margin-bottom: 10px;
      font-size: 10px; letter-spacing: 0.08em;
    }
    .registry-label { color: var(--dim); letter-spacing: 0.14em; }
    .registry-object { color: var(--fg); }
    .registry-dots { color: var(--dim); white-space: nowrap; }
    .registry-classline {
      grid-column: 2 / 4; color: #777; font-size: 9px;
      font-style: italic; opacity: 0.85; letter-spacing: 0.08em;
    }
    .registry-rule { border: 0; border-top: 1px solid var(--panel-border); margin: 12px 0; }
    .registry-content { color: #777; margin: 14px 0 16px; }
    .registry-fields { display: grid; grid-template-columns: 96px minmax(0, 1fr); gap: 5px 12px; font-size: 10px; }
    .registry-field-extra {
      background: rgba(0,0,0,0.035); padding: 2px 4px; margin-left: -4px;
      font-style: italic;
    }
    .registry-hook { margin-top: 14px; color: #444; font-size: 11px; }
    .axis-radial {
      width: min(100%, 280px); height: 200px; margin: 8px 0 12px;
      display: block; overflow: visible;
    }
    .axis-radial-line {
      stroke: #cfcfca; stroke-width: 1; transition: stroke 0.15s;
    }
    .axis-radial-center { fill: #222; }
    .axis-radial-label {
      font-family: var(--font); font-size: 9px; letter-spacing: 0.08em;
      fill: #666; cursor: pointer; transition: fill 0.15s, text-decoration 0.15s;
    }
    .axis-radial-target:hover .axis-radial-line { stroke: #333; }
    .axis-radial-target:hover .axis-radial-label { fill: #111; text-decoration: underline; }
    .axis-mobile-list { display: none; margin: 12px 0 14px; }
    .axis-mobile-item {
      background: none; border: 0; color: #666; cursor: pointer;
      display: block; font-family: var(--font); font-size: 9px;
      letter-spacing: 0.08em; padding: 2px 0; text-align: left;
    }
    .axis-mobile-item:hover { color: #111; text-decoration: underline; }

    /* ── top UI bar ── */
    #ui {
      position: fixed; top: 0; left: 0; right: 0; height: 36px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px; z-index: 30; pointer-events: none;
    }
    #ui > * { pointer-events: all; }
    #ui-title { font-size: 10px; color: var(--dim); letter-spacing: 0.12em; }
    #ui-right  { display: flex; gap: 10px; align-items: center; }

    .ui-btn {
      background: none; border: none; color: var(--dim); font-family: var(--font);
      font-size: 10px; cursor: pointer; letter-spacing: 0.1em; padding: 2px 0;
      text-decoration: none;
    }
    .ui-btn:hover { color: var(--fg); }
    .ui-btn.danger { color: #555; }
    .ui-btn.danger:hover { color: #000; }

    /* ── tag labels ── */
    .tag-label {
      position: fixed; font-family: var(--font); font-size: 9px;
      letter-spacing: 0.1em; color: #333; pointer-events: none;
      white-space: nowrap; transform: translateY(-50%);
    }

    /* ── status messages ── */
    #status {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      font-size: 9px; color: var(--dim); letter-spacing: 0.12em;
      z-index: 40; opacity: 0; transition: opacity 0.3s; white-space: nowrap;
    }
    #status.show { opacity: 1; }

    /* ── solve toast ── */
    #solve-toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: var(--fg); letter-spacing: 0.1em; z-index: 40;
      background: var(--panel-bg); border: 1px solid var(--accent);
      padding: 8px 16px; opacity: 0; transition: opacity 0.6s; pointer-events: none;
      display: flex; gap: 10px; align-items: center;
    }
    #solve-toast.show { opacity: 1; pointer-events: all; }
    #solve-toast button {
      background: none; border: 1px solid var(--panel-border); color: var(--dim);
      font-family: var(--font); font-size: 9px; padding: 3px 7px; cursor: pointer;
      letter-spacing: 0.08em;
    }
    #solve-toast button:hover { color: var(--fg); }

    /* ── hint ── */
    #hint {
      position: fixed; bottom: 20px; right: 20px;
      font-size: 9px; color: #333; letter-spacing: 0.08em; z-index: 30;
      line-height: 1.6; text-align: right; pointer-events: none;
      transition: opacity 1s;
    }

    /* ── mobile fallback ── */
    #mobile-grid {
      display: none;
      position: fixed; inset: 0; overflow-y: auto;
      padding: 48px 16px 24px;
      flex-direction: column; gap: 0;
    }
    .mobile-layer-label {
      font-size: 9px; color: var(--dim); letter-spacing: 0.2em;
      padding: 16px 0 8px; border-bottom: 1px solid var(--panel-border); margin-bottom: 4px;
    }
    .mobile-row { display: flex; gap: 4px; margin-bottom: 4px; }
    .mobile-cell {
      flex: 1; aspect-ratio: 1; background: #141414; border: 1px solid #1e1e1e;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; gap: 3px; transition: background 0.15s;
    }
    .mobile-cell:hover { background: #1e1e1e; }
    .mobile-cell .cid  { font-size: 7px; color: #444; letter-spacing: 0.1em; }
    .mobile-cell .ctitle { font-size: 9px; color: var(--dim); }

    @media (max-width: 640px) {
      #c, #tags, #hint { display: none; }
      #mobile-grid     { display: flex; }
      body.panel-open #panel { width: 100%; }
      body.panel-open #panel.expanded { width: 100%; }
      #panel-shell { display: block; }
      #panel-nav { position: static; max-height: none; margin-bottom: 24px; border-right: 0; border-bottom: 1px solid var(--panel-border); padding-bottom: 16px; }
      .axis-radial { display: none; }
      .axis-mobile-list { display: block; }
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>
<svg id="tags" xmlns="http://www.w3.org/2000/svg"></svg>

<div id="panel">
  <button id="panel-close">✕ close</button>
  <button id="panel-expand">expand</button>
  <div id="panel-shell">
    <nav id="panel-nav" aria-label="Cube archive directory"></nav>
    <section id="panel-main">
      <div id="panel-id"></div>
      <div id="panel-title"></div>
      <div id="panel-body"></div>
      <div id="panel-links"></div>
    </section>
  </div>
</div>

<div id="ui">
  <span id="ui-title">mirror cube</span>
  <div id="ui-right">
    <button class="ui-btn danger" id="solve-btn">SOLVE</button>
    <button class="ui-btn" id="lang-btn">EN</button>
    <a class="ui-btn" href="index.html">← back</a>
  </div>
</div>

<div id="hint">click · open<br>drag on piece · rotate layer<br>drag · orbit</div>
<div id="status"></div>
<div id="solve-toast">✦ solved <button id="solve-open">open core</button></div>

<div id="mobile-grid"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ── i18n ──────────────────────────────────────────────────────────────────
let LANG = 'en';
const STRINGS = {
  en: { scrambling: 'scrambling...', hint: 'click · open\ndrag on piece · rotate layer\ndrag · orbit' },
  zh: {},
};
function t(k) { return (LANG === 'zh' && STRINGS.zh[k]) ? STRINGS.zh[k] : (STRINGS.en[k] || k); }

// ── Pieces data ───────────────────────────────────────────────────────────
// gx=0..2 (left→right), gy=0..2 (bottom→top), gz=0..2 (back→front)
// C=gy2 Context · E=gy1 Excavation · T=gy0 Theory
const PIECES_DATA = [
  // C — Context (top layer, gy=2)
  { id:'C-01', title:'Place',       gx:0,gy:2,gz:0,
    content:'<p>The situatedness of knowledge. Where we stand when we speak, and how that position shapes what can be known.</p>' },
  { id:'C-02', title:'Time',        gx:1,gy:2,gz:0,
    content:'<p>Stratigraphy as argument. The past is not yet over — it accumulates, reworks, sediments into the present.</p>' },
  { id:'C-03', title:'Memory',      gx:2,gy:2,gz:0,
    content:'<p>How surfaces hold trace. The politics of what gets remembered, by whom, and in what form.</p>' },
  { id:'C-04', title:'Landscape',   gx:0,gy:2,gz:1,
    content:'<p>Not backdrop but agent. Ground that moves, vegetation that obscures and reveals. Landscape as process.</p>' },
  { id:'C-05', title:'Heritage',    gx:1,gy:2,gz:1,
    content:'<p>The politics of preservation. Authorised heritage discourse and what falls outside the frame.</p>' },
  { id:'C-06', title:'Archive',     gx:2,gy:2,gz:1,
    content:'<p>Institutional memory and its gaps. The distance between document and deposit, record and ruin.</p>' },
  { id:'C-07', title:'Institution', gx:0,gy:2,gz:2,
    content:'<p>The bureaucratic life of sites. Care and neglect as policy. How institutions accumulate afterlives.</p>' },
  { id:'C-08', title:'Community',   gx:1,gy:2,gz:2,
    content:'<p>Who claims a site. Whose knowledge counts. The relational web within which heritage is made legible.</p>' },
  { id:'C-09', title:'Policy',      gx:2,gy:2,gz:2,
    content:'<p>Where legislation meets landscape. The edge cases of protection, and the slow work of zoning change.</p>' },

  // E — Excavation (middle layer, gy=1)
  { id:'E-01', title:'Method',      gx:0,gy:1,gz:0,
    content:'<p>How we get to knowing. The bias built into technique — every method frames what can be found.</p>' },
  { id:'E-02', title:'Survey',      gx:1,gy:1,gz:0,
    content:'<p>Walking as research. Coverage, gaps, conditions of observation. The body as instrument in the field.</p>' },
  { id:'E-03', title:'Sensing',     gx:2,gy:1,gz:0,
    content:'<p>LiDAR, aerial photography, multispectral analysis. Seeing without touching — and what that costs.</p>' },
  { id:'E-04', title:'GIS',         gx:0,gy:1,gz:1,
    content:'<p>Spatial argument. Layers as claims. The interpretive work hidden inside cartographic convention.</p>' },
  { id:'E-05', title:'Core',        gx:1,gy:1,gz:1, hidden:true,
    content:'<p>The invisible centre. Only accessible when everything else is in its place.</p>' },
  { id:'E-06', title:'Field',       gx:2,gy:1,gz:1,
    content:'<p>Presence as instrument. The knowing body in the trench, mud as data, discomfort as method.</p>' },
  { id:'E-07', title:'Material',    gx:0,gy:1,gz:2,
    content:'<p>What objects do. Thing-power and the agency distributed across artefacts and assemblages.</p>' },
  { id:'E-08', title:'Analysis',    gx:1,gy:1,gz:2,
    content:'<p>From data to interpretation. The inferential leap, and the responsibility it carries.</p>' },
  { id:'E-09', title:'Record',      gx:2,gy:1,gz:2,
    content:'<p>The archive we make while we work. Field notes as argument, drawing as observation.</p>' },

  // T — Theory (bottom layer, gy=0)
  { id:'T-01', title:'Phenom.',     gx:0,gy:0,gz:0,
    content:'<p>Phenomenology: lived experience as evidence. Perception before cognition. The body that perceives before the mind that categorises.</p>' },
  { id:'T-02', title:'Process',     gx:1,gy:0,gz:0,
    content:'<p>Processual thinking: sites as events, not objects. Becoming over being. The landscape perpetually under construction.</p>' },
  { id:'T-03', title:'Assemblage',  gx:2,gy:0,gz:0,
    content:'<p>Emergent wholes from heterogeneous parts. Relations precede entities. DeLanda after Deleuze.</p>' },
  { id:'T-04', title:'Taskscape',   gx:0,gy:0,gz:1,
    content:'<p>Tim Ingold\'s interlocking rhythms of dwelling and movement. The landscape as the congealment of past activity.</p>' },
  { id:'T-05', title:'Visibility',  gx:1,gy:0,gz:1,
    content:'<p>What can be seen, from where, and by whom. The politics of legibility and the labour of making visible.</p>' },
  { id:'T-06', title:'Relational',  gx:2,gy:0,gz:1,
    content:'<p>Whakapapa as method. Sites constituted through connection. Heritage as a web of relations in time.</p>' },
  { id:'T-07', title:'Embodiment',  gx:0,gy:0,gz:2,
    content:'<p>The knowing body. Positionality as epistemology. What it means to research from a particular flesh.</p>' },
  { id:'T-08', title:'Afterlife',   gx:1,gy:0,gz:2,
    content:'<p>What persists beyond function. The second histories of institutions, asylum walls, and abandoned infrastructure.</p>' },
  { id:'T-09', title:'Semiotics',   gx:2,gy:0,gz:2,
    content:'<p>Signs in soil. Meaning made from material residue. The interpretive gap between trace and text.</p>' },
];

// ── Mirror Cube geometry ──────────────────────────────────────────────────
const XS = [0.42, 1.0, 1.58];  // thin:mid:thick ≈ 1:2.4:3.8
const YS = [0.52, 1.0, 1.48];
const ZS = [0.47, 1.0, 1.53];
const GAP = 0.028;

function centers(sizes) {
  return [-(sizes[1]/2 + sizes[0]/2), 0, sizes[1]/2 + sizes[2]/2];
}
const XC = centers(XS), YC = centers(YS), ZC = centers(ZS);

// ── Renderer ──────────────────────────────────────────────────────────────
const isMobile = window.innerWidth <= 640;

const canvas  = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf2f2f0);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(0.04)).texture;
pmrem.dispose();

const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(4.9, 3.85, 6.15);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.enableZoom = false;
controls.enablePan = false;
controls.autoRotate = false;

// Lights (brighter for white bg)
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const key = new THREE.DirectionalLight(0xffffff, 1.8);
key.position.set(5, 8, 6);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 0.5; key.shadow.camera.far = 30;
key.shadow.camera.left = -5; key.shadow.camera.right = 5;
key.shadow.camera.top = 5; key.shadow.camera.bottom = -5;
key.shadow.bias = -0.001;
scene.add(key);
const fill = new THREE.DirectionalLight(0x8888ff, 0.35);
fill.position.set(-4, -1, -5); scene.add(fill);
const rim = new THREE.DirectionalLight(0xfff8e0, 0.5);
rim.position.set(-2, 4, -5); scene.add(rim);

// ── Build pieces ──────────────────────────────────────────────────────────
const cubeGroup = new THREE.Group();
scene.add(cubeGroup);
cubeGroup.position.set(0, 0, 0);
let cubeBaseX = 0;

const pieceMeshes = [];
const DEBUG_ROTATION = false;

const edgeMat = new THREE.LineBasicMaterial({ color: 0x111111, depthTest: true });

const AXIS_TAXONOMY = {
  stance: ['OBSERVER', 'PRACTITIONER', 'SUBJECT'],
  knowledge: ['THEORY', 'EXCAVATION', 'CONTEXT'],
  domain: ['ARCHAEOLOGY', 'ANTHROPOLOGY', 'DESIGN+GAMES'],
};

const REGISTRY_META = {
  'C-01': { recorded:'2023', located:'field notes / place memory', hook:'Who is allowed to stand here and call it context?' },
  'C-02': { recorded:'2024', located:'archive shelf / timeline', hook:'When does a record stop being past tense?' },
  'C-03': { recorded:'2024', located:'memory surface', hook:'Is memory evidence, or a method of arrangement?' },
  'C-04': { recorded:'2023', located:'landscape transect', hook:'Is landscape background, or the first collaborator?' },
  'C-05': { recorded:'2026', located:'portfolio cabinet', hook:'Who decided this counts as heritage?' },
  'C-06': { recorded:'2025', located:'institutional archive', hook:'What disappears when the archive becomes legible?' },
  'C-07': { recorded:'2025', located:'bureaucratic afterlife', hook:'Can an institution be excavated like a site?' },
  'C-08': { recorded:'2026', located:'community relation', hook:'Where does authorship end and relation begin?' },
  'C-09': { recorded:'2026', located:'policy edge', hook:'Who gets protected by the frame?' },
  'E-01': { recorded:'2024', located:'method drawer', hook:'Is this a field note, or something else?' },
  'E-02': { recorded:'2023', located:'survey line', hook:'What does walking know before analysis begins?' },
  'E-03': { recorded:'2025', located:'remote sensing layer', hook:'What kind of intimacy is distance?' },
  'E-04': { recorded:'2025', located:'GIS workspace', hook:'Is a layer evidence, or an argument?' },
  'E-05': { recorded:'2026', located:'invisible centre', hook:'Who is at the centre when the centre is hidden?' },
  'E-06': { recorded:'2024', located:'field season', hook:'Who is recording whom in the trench?' },
  'E-07': { recorded:'2024', located:'material assemblage', hook:'What does the object make the researcher do?' },
  'E-08': { recorded:'2025', located:'analysis table', hook:'When does data become interpretation?' },
  'E-09': { recorded:'2025', located:'recording system', hook:'Is the record neutral, or another artefact?' },
  'T-01': { recorded:'2024', located:'sensory method', hook:'Who decided this counts as theory?' },
  'T-02': { recorded:'2024', located:'process model', hook:'What remains unfinished inside a finished site?' },

function makeMat() {
  return new THREE.MeshStandardMaterial({
    color: 0xd4d4d2,
    metalness: 0.80,
    roughness: 0.15,
    envMapIntensity: 1.4,
  });
}

for (const pd of PIECES_DATA) {
  if (pd.hidden) continue;
  const { gx, gy, gz } = pd;
  const geo = new THREE.BoxGeometry(XS[gx]-GAP, YS[gy]-GAP, ZS[gz]-GAP);
  const mesh = new THREE.Mesh(geo, makeMat());
  mesh.position.set(XC[gx], YC[gy], ZC[gz]);
  mesh.userData = {
    pd, gx, gy, gz, origGx:gx, origGy:gy, origGz:gz,
    origDims: { x: XS[gx]-GAP, y: YS[gy]-GAP, z: ZS[gz]-GAP },
  };
  mesh.castShadow = true;
  mesh.receiveShadow = true;

  // Black edge lines
  const edges = new THREE.LineSegments(new THREE.EdgesGeometry(geo), edgeMat);
  mesh.add(edges);

  cubeGroup.add(mesh);
  pieceMeshes.push(mesh);
}

// ── Layer rotation ─────────────────────────────────────────────────────────
let isRotating = false;
let totalMoves = 0;

function getLayer(axis, idx) {
  return pieceMeshes.filter(m => m.userData[axis] === idx);
}

const AXIS_VEC = { gx: new THREE.Vector3(1,0,0), gy: new THREE.Vector3(0,1,0), gz: new THREE.Vector3(0,0,1) };

function rotateLayer(axis, layerIdx, dir) {
  return new Promise(resolve => {
    if (isRotating) { resolve(); return; }
    clearPlaneHighlight();
    resetTransientPieceStyles();
    isRotating = true;
    const layer = getLayer(axis, layerIdx);
    const pivot = new THREE.Object3D();
    cubeGroup.add(pivot);
    layer.forEach(m => { pivot.attach(m); });

    const target = dir * Math.PI / 2;
    const duration = 220;
    const t0 = performance.now();
    let prev = 0;

    function step(now) {
      const p = Math.min((now - t0) / duration, 1);
      const e = p < 0.5 ? 2*p*p : -1+(4-2*p)*p;
      const angle = target * e;
      pivot.rotateOnAxis(AXIS_VEC[axis], angle - prev);
      prev = angle;
      if (p < 1) { requestAnimationFrame(step); return; }

      layer.forEach(m => {
        cubeGroup.attach(m);
        ['x','y','z'].forEach(k => { m.position[k] = Math.round(m.position[k]*1000)/1000; });
      });
      cubeGroup.remove(pivot);
      updateGrid(axis, layerIdx, dir);
      validateCubeState(`rotate ${axis}${layerIdx} ${dir}`);
      isRotating = false;
      resolve();
    }
    requestAnimationFrame(step);
  });
}

let isScrambling = false;

function updateGrid(axis, layerIdx, dir) {
  const layer = pieceMeshes.filter(m => m.userData[axis] === layerIdx);
  for (const m of layer) {
    const { gx, gy, gz } = m.userData;
    let nx = gx, ny = gy, nz = gz;
    if (axis === 'gy') {
      if (dir > 0) { nx = gz;     nz = 2 - gx; }
      else         { nx = 2 - gz; nz = gx; }
    } else if (axis === 'gx') {
      if (dir > 0) { ny = 2 - gz; nz = gy; }
      else         { ny = gz;     nz = 2 - gy; }
    } else {
      if (dir > 0) { nx = 2 - gy; ny = gx; }
      else         { nx = gy;     ny = 2 - gx; }
    }
    m.userData.gx = nx; m.userData.gy = ny; m.userData.gz = nz;
  }
  if (!isScrambling) { totalMoves++; checkSolved(); }
}

function isCurrentlySolved() {
  return pieceMeshes
    .filter(m => !m.userData.pd.hidden)
    .every(m =>
      m.userData.gx === m.userData.origGx &&
      m.userData.gy === m.userData.origGy &&
      m.userData.gz === m.userData.origGz
    );
}

function removeHiddenCoreMeshes() {
  for (const m of [...pieceMeshes]) {
    if (!m.userData.pd.hidden) continue;
    cubeGroup.remove(m);
    pieceMeshes.splice(pieceMeshes.indexOf(m), 1);
  }
}

function exitSolvedMode() {
  if (!solved) return;
  solved = false;
  clearPlaneHighlight();
  setHighlightedMesh(null);
  removeHiddenCoreMeshes();
  document.getElementById('solve-toast').classList.remove('show');

  if (!activeMesh) return;
  if (activeMesh.userData.pd.hidden) {
    closePanel();
    return;
  }
  renderRegistryCard(activeMesh.userData.pd);
  buildPanelDirectory(activeMesh.userData.pd.id);
  setHighlightedMesh(activeMesh);
}

function checkSolved() {
  if (totalMoves === 0) return;
  const ok = isCurrentlySolved();
  if (ok) onSolved();
  else exitSolvedMode();
}

// ── Date-seeded scramble ──────────────────────────────────────────────────
function rng32(seed) {
  let s = seed | 0;
  return () => {
    s = s + 0x6D2B79F5 | 0;
    let t = Math.imul(s ^ s>>>15, 1 | s);
    t = t + Math.imul(t ^ t>>>7, 61 | t) ^ t;
    return ((t ^ t>>>14) >>> 0) / 4294967296;
  };
}
function dateSeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
}

const AXES = ['gx','gy','gz'];

function applyMoveInstant(axis, layerIdx, dir) {
  const layer = getLayer(axis, layerIdx);
  const pivot = new THREE.Object3D();
  cubeGroup.add(pivot);
  layer.forEach(m => { pivot.attach(m); });
  pivot.rotateOnAxis(AXIS_VEC[axis], dir * Math.PI / 2);
  layer.forEach(m => {
    cubeGroup.attach(m);
    ['x','y','z'].forEach(k => { m.position[k] = Math.round(m.position[k]*1000)/1000; });
  });
  cubeGroup.remove(pivot);
  updateGrid(axis, layerIdx, dir);
  validateCubeState(`instant ${axis}${layerIdx} ${dir}`);
}

function scrambleFast() {
  isScrambling = true;
  const rand = rng32(dateSeed());
  const n = 18 + Math.floor(rand() * 4);
  let lastAxis = '', lastLayer = -1;
  for (let i = 0; i < n; i++) {
    let axis, layer;
    do {
      axis  = AXES[Math.floor(rand() * 3)];
      layer = Math.floor(rand() * 3);
    } while (axis === lastAxis && layer === lastLayer);
    const dir = rand() > 0.5 ? 1 : -1;
    lastAxis = axis; lastLayer = layer;
    applyMoveInstant(axis, layer, dir);
  }
  isScrambling = false;
  totalMoves = 1;
}

// ── Auto-solve (admin key: backtick) ─────────────────────────────────────
function autoSolve() {
  clearPlaneHighlight();
  resetCubeRotation();
  setHighlightedMesh(null);
  removeHiddenCoreMeshes();
  for (const m of pieceMeshes) {
    const { origGx, origGy, origGz } = m.userData;
    m.userData.gx = origGx; m.userData.gy = origGy; m.userData.gz = origGz;
    m.position.set(XC[origGx], YC[origGy], ZC[origGz]);
    m.rotation.set(0, 0, 0);
  }
  totalMoves = 0;
  solved = true;
  document.getElementById('solve-toast').classList.remove('show');
  if (!pieceMeshes.some(m => m.userData.pd.id === 'E-05')) onSolved();
  if (activeMesh) {
    activeMesh = getPieceMeshById(activeMesh.userData.pd.id);
    if (activeMesh) openPanel(activeMesh);
  }
}
document.addEventListener('keydown', e => { if (e.key === '`') autoSolve(); });

const mouse2 = new THREE.Vector2();

}

function getHit(cx, cy) {
  return getPointerHit(cx, cy)?.object || null;
}

function getPointerHit(cx, cy) {
  const rect = canvas.getBoundingClientRect();
  mouse2.x = ((cx - rect.left) / rect.width)  * 2 - 1;
  mouse2.y = -((cy - rect.top)  / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse2, camera);
  const hits = raycaster.intersectObjects(pieceMeshes, false);
  return hits.find(hit => hit.face && hit.object?.userData?.pd) || null;
}

function getWorldFaceNormal(hit) {
  if (!hit?.face) return null;
  return hit.face.normal.clone()
    .transformDirection(hit.object.matrixWorld)
    .normalize();
}

function getWorldDragDirection(dx, dy) {
  camera.updateMatrixWorld();
  const right = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld, 0).multiplyScalar(dx);
  const up = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld, 1).multiplyScalar(-dy);
  return right.add(up).normalize();
}

function strongestAxis(v) {
  const ax = Math.abs(v.x), ay = Math.abs(v.y), az = Math.abs(v.z);
  if (ax >= ay && ax >= az) return { axis: 'gx', value: v.x };
  if (ay >= ax && ay >= az) return { axis: 'gy', value: v.y };
  return { axis: 'gz', value: v.z };
}

function inferLayerRotation(hit, dx, dy) {
  const drag = getWorldDragDirection(dx, dy);
  if (drag.lengthSq() === 0) return null;
  const normal = getWorldFaceNormal(hit);
  if (!normal) return null;
  const rotation = normal.cross(drag);
  if (rotation.lengthSq() < 0.01) return null;
  const { axis, value } = strongestAxis(rotation);
  return {
    axis,
    layerIdx: hit.object.userData[axis],
    dir: value >= 0 ? 1 : -1,
  };
}

function resetPieceMaterial(mesh) {

function geometryDimensions(mesh) {
  if (!mesh.geometry.boundingBox) mesh.geometry.computeBoundingBox();
  const size = new THREE.Vector3();
  mesh.geometry.boundingBox.getSize(size);
  return { x: size.x, y: size.y, z: size.z };
}

function validateCubeState(label) {
  const issues = [];
  const occupied = new Set();
  for (const mesh of pieceMeshes) {
    if (mesh.userData.pd.hidden) continue;
    const { gx, gy, gz, origDims } = mesh.userData;
    const key = `${gx}-${gy}-${gz}`;
    if (occupied.has(key)) issues.push({ id: mesh.userData.pd.id, issue: 'duplicate grid cell', key });
    occupied.add(key);
    const dims = geometryDimensions(mesh);
    const dimMismatch = ['x','y','z'].some(axis => Math.abs(dims[axis] - origDims[axis]) > 0.001);
    const badScale = Math.abs(mesh.scale.x - 1) > 0.001 || Math.abs(mesh.scale.y - 1) > 0.001 || Math.abs(mesh.scale.z - 1) > 0.001;
    if (dimMismatch || badScale) {
      issues.push({
        id: mesh.userData.pd.id,
        gx, gy, gz,
        expected: origDims,
        actual: dims,
        scale: { x: mesh.scale.x, y: mesh.scale.y, z: mesh.scale.z },
      });
    }
  }
  if (occupied.size !== 26) issues.push({ issue: 'visible occupancy count', count: occupied.size });
  if (issues.length) console.warn(`[cube invariant] ${label}`, issues);
  else if (DEBUG_ROTATION) {
    console.table(pieceMeshes.filter(m => !m.userData.pd.hidden).map(m => ({
      id: m.userData.pd.id,
      gx: m.userData.gx,
      gy: m.userData.gy,
      gz: m.userData.gz,
      dims: JSON.stringify(geometryDimensions(m)),
    })));
  }
}

function clearPlaneHighlight() {
  highlightMode = null;
  for (const mesh of pieceMeshes) {

      mesh.position.sub(mesh.userData.highlightOffset);
      mesh.userData.highlightOffset = null;

    resetPieceMaterial(mesh);

function setMeshHighlightState(mesh, state) {
  mesh.material.transparent = true;
  mesh.material.opacity = state.opacity;
  if (state.offset) {
    mesh.position.add(state.offset);
    mesh.userData.highlightOffset = state.offset.clone();
  }
  mesh.children.forEach(child => {
    if (!child.isLineSegments) return;
    if (child.material === edgeMat) child.material = edgeMat.clone();
    child.material.color.setHex(state.edgeColor);
    child.material.transparent = true;
    child.material.opacity = state.edgeOpacity;
    child.material.linewidth = state.edgeWidth;
  });
}

function highlightPlane(axis, idx) {
  if (!solved) return;
  clearPlaneHighlight();
  highlightMode = { type: 'plane', axis, idx };
  for (const mesh of pieceMeshes) {
    const inPlane = mesh.userData[axis] === idx;
    setMeshHighlightState(mesh, {
      opacity: inPlane ? 1 : 0.30,
      offset: null,
      edgeColor: inPlane ? 0xffffff : 0x111111,
      edgeOpacity: inPlane ? 1 : 0.18,
      edgeWidth: inPlane ? 2 : 1,
    });
  }
}

function highlightRelatedPlanes(mesh) {
  if (!solved || !mesh) return;
  clearPlaneHighlight();
  const { gx, gy, gz } = mesh.userData;
  highlightMode = { type: 'related', gx, gy, gz };
  for (const candidate of pieceMeshes) {
    const related =
      candidate.userData.gx === gx ||
      candidate.userData.gy === gy ||
      candidate.userData.gz === gz;
    setMeshHighlightState(candidate, {
      opacity: related ? 1 : 0.30,
      offset: null,
      edgeColor: related ? 0xffffff : 0x111111,
      edgeOpacity: related ? 1 : 0.16,
      edgeWidth: related ? 2 : 1,
    });
  }
}

function tweenTarget(toX) {
  const fromX = controls.target.x;
  const fromBaseX = cubeBaseX;
  const t0 = performance.now();
  const dur = 450;
  function step(now) {
    const p = Math.min((now-t0)/dur, 1);
    const e = 1 - Math.pow(1-p, 3);
    controls.target.x = fromX + (toX - fromX) * e;
    cubeBaseX = fromBaseX + (toX - fromBaseX) * e;
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function focusCameraOnMesh(mesh) {
  if (!mesh) return;
  if (cameraTween) cancelAnimationFrame(cameraTween);
  if (cubeFocusTween) cancelAnimationFrame(cubeFocusTween);

  const fromTarget = controls.target.clone();
  const fromBaseX = cubeBaseX;
  const toTarget = new THREE.Vector3(getPanelTargetX(), 0, 0);
  const t0 = performance.now();
  const dur = 820;

  function targetStep(now) {
    const p = Math.min((now - t0) / dur, 1);
    const e = p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p + 2, 2) / 2;
    controls.target.lerpVectors(fromTarget, toTarget, e);
    cubeBaseX = THREE.MathUtils.lerp(fromBaseX, toTarget.x, e);
    if (p < 1) cameraTween = requestAnimationFrame(targetStep);
    else cameraTween = null;
  }
  cameraTween = requestAnimationFrame(targetStep);

  const { gx, gy, gz } = mesh.userData;
  const fromRotation = {
    x: cubeGroup.rotation.x,
    y: cubeGroup.rotation.y,
    z: cubeGroup.rotation.z,
  };
  const toRotation = {
    x: THREE.MathUtils.degToRad((1 - gy) * 6),
    y: THREE.MathUtils.degToRad((gx - 1) * -10 + (gz - 1) * 7),
    z: 0,
  };
  const rt0 = performance.now();
  const rdur = 980;

  function rotationStep(now) {
    const p = Math.min((now - rt0) / rdur, 1);
    const e = 1 - Math.pow(1 - p, 3);
    cubeGroup.rotation.x = THREE.MathUtils.lerp(fromRotation.x, toRotation.x, e);
    cubeGroup.rotation.y = THREE.MathUtils.lerp(fromRotation.y, toRotation.y, e);
    cubeGroup.rotation.z = THREE.MathUtils.lerp(fromRotation.z, toRotation.z, e);
    if (p < 1) cubeFocusTween = requestAnimationFrame(rotationStep);
    else cubeFocusTween = null;
  }
  cubeFocusTween = requestAnimationFrame(rotationStep);
}

function tweenCubeRotationToNeutral() {
  if (cubeFocusTween) cancelAnimationFrame(cubeFocusTween);
  const fromRotation = {
    x: cubeGroup.rotation.x,
    y: cubeGroup.rotation.y,
    z: cubeGroup.rotation.z,
  };
  const t0 = performance.now();
  const dur = 620;
  function step(now) {
    const p = Math.min((now - t0) / dur, 1);
    const e = 1 - Math.pow(1 - p, 3);
    cubeGroup.rotation.x = THREE.MathUtils.lerp(fromRotation.x, 0, e);
    cubeGroup.rotation.y = THREE.MathUtils.lerp(fromRotation.y, 0, e);
    cubeGroup.rotation.z = THREE.MathUtils.lerp(fromRotation.z, 0, e);
    if (p < 1) cubeFocusTween = requestAnimationFrame(step);
    else cubeFocusTween = null;
  }
  cubeFocusTween = requestAnimationFrame(step);
}

function resetCubeRotation() {
  if (cubeFocusTween) {
    cancelAnimationFrame(cubeFocusTween);
    cubeFocusTween = null;
  }
  cubeGroup.rotation.set(0, 0, 0);
}

function buildPanelDirectory(activeId) {
  panelNav.innerHTML = '';
  if (!solved) {
    const section = document.createElement('div');
    section.className = 'panel-nav-section';
    const heading = document.createElement('div');
    heading.className = 'panel-nav-heading';
    heading.textContent = 'Unclassified Objects';
    section.appendChild(heading);

    if (discoveryLog.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'panel-nav-note';
      empty.textContent = 'No field records yet. Click an object to begin.';
      section.appendChild(empty);
    }

    discoveryLog.forEach((pieceId, idx) => {
      const piece = PIECES_DATA.find(p => p.id === pieceId);
      if (!piece || piece.hidden) return;
      const item = document.createElement('button');
      item.className = `panel-nav-item${piece.id === activeId ? ' active' : ''}`;
      item.type = 'button';
      item.dataset.pieceId = piece.id;
      item.innerHTML = `<span class="object-index-no">${String(idx + 1).padStart(3, '0')}</span>`;
      item.addEventListener('click', () => {
        const mesh = getPieceMeshById(piece.id);
        if (mesh) openPanel(mesh);
      });
      section.appendChild(item);
    });

    const placeholders = Math.max(3, Math.min(8, 27 - discoveryLog.length));
    for (let i = 0; i < placeholders; i++) {
      const placeholder = document.createElement('div');
      placeholder.className = 'undiscovered-item';
      placeholder.textContent = '···';
      section.appendChild(placeholder);
    }

    panelNav.appendChild(section);
    return;
  }

  const activePiece = PIECES_DATA.find(piece => piece.id === activeId);
  const intro = document.createElement('div');
  intro.className = 'panel-nav-note';
  intro.textContent = activePiece
    ? `${objectNo(activePiece)} resolves through three planes. Use the radial labels in the card, or open another object.`
    : 'Solved map. Open an object to read its three planes.';
  panelNav.appendChild(intro);

  const objectMenu = document.createElement('details');
  objectMenu.className = 'panel-axis-menu';
  const objectSummary = document.createElement('summary');
  objectSummary.textContent = 'OBJECT DRAWER';
  objectMenu.appendChild(objectSummary);

  const objectOptions = document.createElement('div');
  objectOptions.className = 'panel-axis-options';
  for (const piece of PIECES_DATA.filter(p => !p.hidden).sort(coordinateSort)) {
    const item = document.createElement('button');
    item.className = `panel-nav-item${piece.id === activeId ? ' active' : ''}`;
    item.type = 'button';
    item.dataset.pieceId = piece.id;
    const field = fieldNo(piece);
    item.innerHTML = `${field ? `<span class="field-no">${field}</span> · ` : ''}${objectNo(piece)} · ${semanticTriplet(piece).join(' · ')}`;
    item.addEventListener('click', () => {
      const mesh = getPieceMeshById(piece.id);
      if (mesh) openPanel(mesh);
    });
    objectOptions.appendChild(item);
  }
  objectMenu.appendChild(objectOptions);
  panelNav.appendChild(objectMenu);
}

function openPanel(mesh) {
  const { pd } = mesh.userData;
  if (pd.hidden && !(solved && pd.id === 'E-05')) return;
  recordDiscovery(pd);
  renderRegistryCard(pd);
  panelLinks.innerHTML   = pd.links ? pd.links.map(l =>
    `<a class="panel-link" href="${l.url}" target="_blank">${l.label}</a>`
  ).join('') : '';
  document.body.classList.add('panel-open');
  activeMesh = mesh;
  setHighlightedMesh(mesh);
  buildPanelDirectory(pd.id);
  if (solved) highlightRelatedPlanes(mesh);
  focusCameraOnMesh(mesh);
}

function closePanel() {
  if (cameraTween) {
    cancelAnimationFrame(cameraTween);
    cameraTween = null;
  }
  if (cubeFocusTween) {
    cancelAnimationFrame(cubeFocusTween);
    cubeFocusTween = null;
  }
  document.body.classList.remove('panel-open');
  activeMesh = null;
  setHighlightedMesh(null);
  clearPlaneHighlight();
  tweenCubeRotationToNeutral();
  tweenTarget(0);
}

document.getElementById('panel-close').addEventListener('click', closePanel);
document.getElementById('panel-expand').addEventListener('click', () => {
  panel.classList.toggle('expanded');
  document.getElementById('panel-expand').textContent = panel.classList.contains('expanded') ? 'shrink' : 'expand';
  if (activeMesh) focusCameraOnMesh(activeMesh);
});

// ── Pointer interaction ───────────────────────────────────────────────────
// drag on empty → orbit (OrbitControls handles it)
// drag on piece → rotate layer (we intercept, disable orbit)
// click on piece (no drag) → open/close panel
let pdPos = null, pdMesh = null, layerDrag = null;

canvas.addEventListener('pointermove', e => {
  // hover
  if (!pdMesh) {
    const h = getHit(e.clientX, e.clientY);
    if (h !== hoveredMesh) { hoveredMesh = h; canvas.style.cursor = h ? 'pointer' : 'default'; }
  }

  if (!layerDrag || isRotating) return;
  const dx = e.clientX - layerDrag.sx;
  const dy = e.clientY - layerDrag.sy;
  if (!layerDrag.axis && Math.hypot(dx, dy) > 7) {
    const inferred = inferLayerRotation(layerDrag.hit, dx, dy);
    if (inferred) Object.assign(layerDrag, inferred);
  }
  if (layerDrag.axis && Math.hypot(dx, dy) > 20) {
    const { axis, layerIdx, dir } = inferLayerRotation(layerDrag.hit, dx, dy) || layerDrag;
    layerDrag = null;
    controls.enabled = true;
    rotateLayer(axis, layerIdx, dir);
  }
});

canvas.addEventListener('pointerdown', e => {
  if (e.button !== 0) return;
  const hitInfo = getPointerHit(e.clientX, e.clientY);
  const hit = hitInfo?.object || null;
  pdPos = { x: e.clientX, y: e.clientY };
  pdMesh = hit;
  if (hit) {
    controls.enabled = false;
    layerDrag = { hit: hitInfo, mesh: hit, sx: e.clientX, sy: e.clientY, axis: null, layerIdx: null, dir: null };
  }
});

canvas.addEventListener('pointerup', e => {
  controls.enabled = true;
  const wasDragging = layerDrag?.axis != null;
  layerDrag = null;
  if (!wasDragging && pdMesh) {
    const moved = Math.hypot(e.clientX - pdPos.x, e.clientY - pdPos.y);
    if (moved < 6) {
      if (activeMesh === pdMesh) closePanel();
      else openPanel(pdMesh);
    }
  }
  pdMesh = null; pdPos = null;
});

// ── Solve ─────────────────────────────────────────────────────────────────
let solved = false;
function onSolved() {
  if (solved && pieceMeshes.some(m => m.userData.pd.id === 'E-05')) return;
  solved = true;
  // Reveal E-05 (hidden center)
  const pd = PIECES_DATA.find(p => p.id === 'E-05');
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(XS[1]-GAP, YS[1]-GAP, ZS[1]-GAP),
    makeMat()
  );
  mesh.position.set(XC[1], YC[1], ZC[1]);
  mesh.userData = {
    pd, gx:1,gy:1,gz:1, origGx:1,origGy:1,origGz:1,
    origDims: { x: XS[1]-GAP, y: YS[1]-GAP, z: ZS[1]-GAP },
  };
  const edges = new THREE.LineSegments(new THREE.EdgesGeometry(mesh.geometry), edgeMat.clone());
  mesh.add(edges);
  cubeGroup.add(mesh);
  pieceMeshes.push(mesh);
  document.getElementById('solve-toast').classList.add('show');
}

document.getElementById('solve-open').addEventListener('click', () => {
  const mesh = getPieceMeshById('E-05');
  if (mesh) openPanel(mesh);
});

// ── Language toggle ───────────────────────────────────────────────────────
document.getElementById('lang-btn').addEventListener('click', () => {
  LANG = LANG === 'en' ? 'zh' : 'en';
  document.getElementById('lang-btn').textContent = LANG.toUpperCase();
  // TODO: populate STRINGS.zh and apply
});

// ── Resize ────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Render loop ───────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  // Gentle float — small Y bob + subtle X drift
  const t = Date.now() * 0.001;
  cubeGroup.position.y = Math.sin(t * 0.55) * 0.038;
  cubeGroup.position.x = cubeBaseX + Math.sin(t * 0.37) * 0.014;
  controls.update();
  if (!isRotating) updateTags();
  renderer.render(scene, camera);
}
animate();

// ── Mobile grid fallback ──────────────────────────────────────────────────
if (isMobile) {
  const container = document.getElementById('mobile-grid');
  const layers = [
    { label: 'C — Context',    pieces: PIECES_DATA.filter(p => p.gy === 2) },
    { label: 'E — Excavation', pieces: PIECES_DATA.filter(p => p.gy === 1 && !p.hidden) },
    { label: 'T — Theory',     pieces: PIECES_DATA.filter(p => p.gy === 0) },
  ];
  for (const layer of layers) {
    const lbl = document.createElement('div');
    lbl.className = 'mobile-layer-label';
    lbl.textContent = layer.label;
    container.appendChild(lbl);
    for (let row = 0; row < 3; row++) {
      const rowEl = document.createElement('div');
      rowEl.className = 'mobile-row';
      for (let col = 0; col < 3; col++) {
        const pd = layer.pieces.find(p => p.gz === row && p.gx === col) || layer.pieces[row*3+col];
        if (!pd) continue;
        const cell = document.createElement('div');
        cell.className = 'mobile-cell';
        cell.innerHTML = `<span class="cid">${pd.id}</span><span class="ctitle">${pd.title}</span>`;
        cell.addEventListener('click', () => {
          panelId.textContent    = pd.id;
          panelTitle.textContent = pd.title;
          panelBody.innerHTML    = pd.content;
          panelLinks.innerHTML   = '';
          document.body.classList.add('panel-open');
        });
        rowEl.appendChild(cell);
      }
      container.appendChild(rowEl);
    }
  }
}

// ── Start scrambled ───────────────────────────────────────────────────────
scrambleFast();
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 8000);
</script>
